<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.A.X</title>

  const firebaseConfig = {
    apiKey:            "AIzaSyDB5CVtV4DxCNQ2OTydJJg_sovWULwkcE0",
    authDomain:        "max-ai-e9525.firebaseapp.com",
    projectId:         "max-ai-e9525",
    storageBucket:     "max-ai-e9525.firebasestorage.app",

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #00010f;
  --surface:  rgba(10,26,110,.45);
  --border:   rgba(77,127,255,.25);
  --blue:     #2a5fff;
  --blue-l:   #4d7fff;
  --white:    #ffffff;
  --off:      #c8d8ff;
  --muted:    #6688bb;
  --err:      #ff6b8a;
  --user-bg:  rgba(42,95,255,.22);
  --max-bg:   rgba(255,255,255,.06);
  --radius:   18px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
}

/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 80% 70% at 50% 40%, #0d2080 0%, #020b3a 50%, #00010f 100%);
}
.bg::before {
  content: ''; position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(42,95,255,.25) 0%, transparent 70%);
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity:.7; transform: translateX(-50%) scale(1); }
  50%      { opacity:1;  transform: translateX(-50%) scale(1.2); }
}

/* ── LAYOUT ── */
#app {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,1,15,.6);
  backdrop-filter: blur(16px);
  flex-shrink: 0;
}

.hdr-left { display: flex; align-items: center; gap: 12px; }

.orb-sm {
  width: 38px; height: 38px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(77,127,255,.5), rgba(42,95,255,.15));
  border: 1.5px solid rgba(77,127,255,.5);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 900;
  letter-spacing: 1px; color: #fff;
  box-shadow: 0 0 20px rgba(42,95,255,.3);
  animation: orbP 4s ease-in-out infinite;
}
@keyframes orbP {
  0%,100% { box-shadow: 0 0 20px rgba(42,95,255,.3); }
  50%      { box-shadow: 0 0 40px rgba(42,95,255,.55); }
}

.hdr-title { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 2px; }
.hdr-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }

.ia-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: rgba(42,95,255,.2); border: 1px solid var(--border);
  color: var(--blue-l); font-weight: 500; transition: all .3s;
}

.avatar-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), #8855ff);
  border: none; color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(42,95,255,.4); transition: transform .2s;
}
.avatar-btn:hover { transform: scale(1.08); }

/* ── CHAT AREA ── */
#chat {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 24px 16px 8px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: rgba(77,127,255,.3); border-radius: 4px; }

/* ── EMPTY STATE ── */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  opacity: .5; animation: fadeIn .6s ease both;
}
.empty-orb {
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(77,127,255,.3), rgba(42,95,255,.05));
  border: 1.5px solid rgba(77,127,255,.3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900;
  color: var(--off);
}
.empty-txt { font-size: 14px; color: var(--muted); text-align: center; }

/* ── MENSAJES ── */
.msg-row {
  display: flex; gap: 10px; animation: slideUp .3s ease both;
  max-width: 100%;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user  { flex-direction: row-reverse; }
.msg-row.max   { flex-direction: row; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; margin-top: 2px;
}
.msg-row.user .msg-avatar {
  background: linear-gradient(135deg, var(--blue), #8855ff);
  font-family: 'Outfit', sans-serif;
}
.msg-row.max .msg-avatar {
  background: radial-gradient(circle at 35% 35%, rgba(77,127,255,.5), rgba(42,95,255,.1));
  border: 1px solid rgba(77,127,255,.4);
  font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 1px;
  box-shadow: 0 0 12px rgba(42,95,255,.3);
}

.msg-content { max-width: calc(100% - 52px); display: flex; flex-direction: column; gap: 4px; }

.msg-row.user  .msg-content { align-items: flex-end; }
.msg-row.max   .msg-content { align-items: flex-start; }

.msg-name { font-size: 11px; color: var(--muted); font-weight: 500; padding: 0 6px; }

.msg-bubble {
  padding: 12px 16px; border-radius: var(--radius);
  font-size: 15px; line-height: 1.6; font-weight: 400;
  word-break: break-word; white-space: pre-wrap;
}

.msg-row.user .msg-bubble {
  background: var(--user-bg);
  border: 1px solid rgba(42,95,255,.35);
  border-bottom-right-radius: 4px;
  color: #fff;
}

.msg-row.max .msg-bubble {
  background: var(--max-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--off);
}

.msg-meta {
  font-size: 10px; color: var(--muted); padding: 0 6px;
  display: flex; align-items: center; gap: 6px;
}

/* ── TYPING INDICATOR ── */
.typing-bubble {
  background: var(--max-bg); border: 1px solid var(--border);
  border-radius: var(--radius); border-bottom-left-radius: 4px;
  padding: 14px 18px; display: flex; align-items: center; gap: 5px;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--blue-l); opacity: .4;
  animation: blink 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,80%,100% { opacity: .2; transform: scale(.8); }
  40%         { opacity: 1;  transform: scale(1.1); }
}

/* ── INPUT AREA ── */
.input-area {
  padding: 12px 16px 20px;
  border-top: 1px solid var(--border);
  background: rgba(0,1,15,.6);
  backdrop-filter: blur(16px);
  flex-shrink: 0;
}

.input-wrap {
  display: flex; align-items: flex-end; gap: 10px;
  background: rgba(10,26,110,.4);
  border: 1.5px solid var(--border);
  border-radius: 16px; padding: 10px 12px;
  transition: border-color .2s, box-shadow .2s;
}
.input-wrap:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(42,95,255,.12);
}

#msg-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fff; font-family: 'Outfit', sans-serif; font-size: 15px;
  resize: none; max-height: 140px; min-height: 24px;
  line-height: 1.5; padding: 2px 0;
}
#msg-input::placeholder { color: rgba(102,136,187,.5); }

.send-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--blue); border: none; cursor: pointer;
  color: #fff; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, transform .15s; flex-shrink: 0;
}
.send-btn:hover  { background: var(--blue-l); transform: scale(1.05); }
.send-btn:active { transform: scale(.95); }
.send-btn:disabled { background: rgba(42,95,255,.3); cursor: not-allowed; transform: none; }

.input-hint {
  text-align: center; font-size: 11px; color: var(--muted);
  margin-top: 8px;
}

/* ── MENÚ USUARIO ── */
.umenu {
  position: fixed; top: 68px; right: 16px;
  background: rgba(10,26,110,.94); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 16px;
  padding: 8px; z-index: 10; min-width: 190px;
  opacity: 0; pointer-events: none;
  transform: translateY(-8px) scale(.96); transition: all .2s;
}
.umenu.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }
.umi {
  padding: 12px 14px; border-radius: 10px; font-size: 14px;
  cursor: pointer; color: var(--off); transition: background .15s;
  display: flex; align-items: center; gap: 8px;
}
.umi:hover { background: rgba(42,95,255,.2); }
.umi.danger { color: var(--err); }
.um-sep { height: 1px; background: rgba(255,255,255,.08); margin: 4px 0; }
.um-name { padding: 10px 14px 6px; font-size: 12px; color: var(--muted); }

/* ── MODAL RECORDATORIOS ── */
.reminder-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  display: none; align-items: center; justify-content: center; z-index: 999;
}
.reminder-box {
  width: 90%; max-width: 500px;
  background: rgba(10,26,110,.97);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 24px; backdrop-filter: blur(20px);
}
.reminder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.reminder-header h2 { font-size: 20px; }
.reminder-header button { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
#newReminder {
  width: 100%; padding: 14px; border-radius: 14px;
  border: 1px solid var(--border); background: rgba(255,255,255,.05);
  color: #fff; margin-bottom: 12px; font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
}
.save-reminder {
  width: 100%; padding: 12px; border: none; border-radius: 14px;
  background: var(--blue); color: #fff; cursor: pointer; margin-bottom: 20px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
}
.reminder-item { display: flex; gap: 10px; margin-bottom: 10px; }
.reminder-item input {
  flex: 1; padding: 10px 12px; border-radius: 10px;
  border: 1px solid var(--border); background: rgba(255,255,255,.05);
  color: #fff; font-family: 'Outfit', sans-serif; font-size: 13px; outline: none;
}
.reminder-item button {
  padding: 10px 14px; border: none; border-radius: 10px;
  background: #ff4466; color: #fff; cursor: pointer; font-size: 13px;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(255,68,102,.9); color: #fff; padding: 10px 20px; border-radius: 50px;
  font-size: 13px; font-weight: 500; z-index: 100; transition: all .3s;
  opacity: 0; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.ok   { background: rgba(26,122,74,.9); }

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* ── BOTÓN VOZ ESTILO CHATGPT ── */
#voice-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(42,95,255,.15);
  border: 1.5px solid rgba(77,127,255,.35);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .3s;
  padding: 0;
}
#voice-btn:hover { background: rgba(42,95,255,.3); }
#voice-btn.activo {
  background: rgba(42,95,255,.35);
  border-color: rgba(77,127,255,.8);
  box-shadow: 0 0 20px rgba(42,95,255,.5);
}

.vbars {
  display: flex; align-items: center; gap: 3px; height: 20px;
}
.vbars span {
  display: block; width: 3px; border-radius: 3px;
  background: rgba(77,127,255,.9);
  height: 6px;
  transition: height .2s;
}

/* Animación cuando está activo */
#voice-btn.activo .vbars span:nth-child(1) { animation: bar 1s ease-in-out infinite 0s; }
#voice-btn.activo .vbars span:nth-child(2) { animation: bar 1s ease-in-out infinite .15s; }
#voice-btn.activo .vbars span:nth-child(3) { animation: bar 1s ease-in-out infinite .3s; }
#voice-btn.activo .vbars span:nth-child(4) { animation: bar 1s ease-in-out infinite .15s; }
#voice-btn.activo .vbars span:nth-child(5) { animation: bar 1s ease-in-out infinite 0s; }

/* Cuando MAX está hablando — barras más intensas */
#voice-btn.hablando .vbars span:nth-child(1) { animation: barBig 0.6s ease-in-out infinite 0s; }
#voice-btn.hablando .vbars span:nth-child(2) { animation: barBig 0.6s ease-in-out infinite .1s; }
#voice-btn.hablando .vbars span:nth-child(3) { animation: barBig 0.6s ease-in-out infinite .2s; }
#voice-btn.hablando .vbars span:nth-child(4) { animation: barBig 0.6s ease-in-out infinite .1s; }
#voice-btn.hablando .vbars span:nth-child(5) { animation: barBig 0.6s ease-in-out infinite 0s; }

@keyframes bar {
  0%,100% { height: 4px; }
  50%      { height: 16px; }
}
@keyframes barBig {
  0%,100% { height: 8px; }
  50%      { height: 20px; }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="toast" id="toast"></div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="orb-sm">MAX</div>
      <div>
        <div class="hdr-title">M.A.X</div>
        <div class="hdr-sub">Asistente Inteligente</div>
      </div>
    </div>

<div style="display:flex;align-items:center;gap:10px;">
  <div class="ia-badge" id="ia-badge">⚡ Listo</div>
  <button class="avatar-btn" id="avatar-btn" onclick="toggleUMenu()">
    <span id="av-letter">U</span>
  </button>
</div>
</div>

  <!-- CHAT -->
  <div id="chat">
    <div class="empty-state" id="empty-state">
      <div class="empty-orb">MAX</div>
      <div class="empty-txt">Hola, <span id="home-name">Usuario</span> 👋<br>Escríbeme algo para comenzar.</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
  <textarea
    id="msg-input"
    placeholder="Escríbeme algo…"
    rows="1"
    onInput="autoResize(this)"
    onKeydown="handleKey(event)"
  ></textarea>
  <button id="voice-btn" onclick="toggleModoLlamada()" title="Modo voz">
    <span class="vbars" id="vbars">
      <span></span><span></span><span></span><span></span><span></span>
    </span>
  </button>
  <button class="send-btn" id="send-btn" onclick="handleSend()">➤</button>
</div>

</div>

<!-- ══ MENÚ USUARIO ══ -->
<div class="umenu" id="umenu">
  <div class="um-name" id="um-name">Mi cuenta</div>
  <div class="um-sep"></div>
  <div class="umi" onclick="clearChat()">🗑️ Limpiar chat</div>
  <div class="umi" onclick="handleReminders()">⏰ Recordatorios</div>
  <div class="umi" onclick="handleConnectMax()">🔗 Conectar con MAX</div>
  <div class="umi" onclick="handleConnectHome()">🏠 Conectar con Casa</div>
  <div class="umi">⚙️ Configuración</div>
  <div class="um-sep"></div>
  <div class="umi danger" onclick="handleLogout()">🚪 Cerrar sesión</div>
</div>

<!-- ══ MODAL RECORDATORIOS ══ -->
<div class="reminder-modal" id="reminderModal">
  <div class="reminder-box">
    <div class="reminder-header">
      <h2>⏰ Recordatorios</h2>
      <button onclick="closeReminders()">✕</button>
    </div>
    <input type="text" id="newReminder" placeholder="Escribe un recordatorio...">
    <button class="save-reminder" onclick="saveReminder()">Guardar</button>
    <div id="reminderList"></div>
  </div>
</div>

<!-- ══ SCRIPTS ══ -->

<!-- RECORDATORIOS -->
<script>
  function handleReminders(){ document.getElementById("reminderModal").style.display="flex"; loadReminders(); }
  function closeReminders()  { document.getElementById("reminderModal").style.display="none"; }

  function saveReminder(){
    const input=document.getElementById("newReminder"); const text=input.value.trim();
    if(!text) return;
    let r=JSON.parse(localStorage.getItem("max_reminders")||"[]"); r.push(text);
    localStorage.setItem("max_reminders",JSON.stringify(r)); input.value=""; loadReminders();
  }

  function loadReminders(){
    const list=document.getElementById("reminderList");
    let r=JSON.parse(localStorage.getItem("max_reminders")||"[]");
    list.innerHTML=r.map((item,i)=>`
      <div class="reminder-item">
        <input type="text" value="${item}" onchange="updateReminder(${i},this.value)">
        <button onclick="deleteReminder(${i})">Eliminar</button>
      </div>`).join("");
  }

  function updateReminder(i,v){
    let r=JSON.parse(localStorage.getItem("max_reminders")||"[]"); r[i]=v.trim();
    localStorage.setItem("max_reminders",JSON.stringify(r));
  }

  function deleteReminder(i){
    let r=JSON.parse(localStorage.getItem("max_reminders")||"[]"); r.splice(i,1);
    localStorage.setItem("max_reminders",JSON.stringify(r)); loadReminders();
  }

  function handleConnectMax(){ showToast("Conectando con MAX...",true); setTimeout(()=>window.location.href="max-connect.html",800); }
  function handleConnectHome(){ showToast("Conectando con Casa...",true); setTimeout(()=>window.location.href="casa-connect.html",800); }
</script>

<!-- SESIÓN / UI -->
<script>
  function getSess(){ return JSON.parse(localStorage.getItem('max_session')||'null'); }
  function clearSess(){ localStorage.removeItem('max_session'); }

  let fbReady=false;
  const fbWait=new Promise(res=>{
    const t=setInterval(()=>{ if(window._fb){fbReady=true;clearInterval(t);res();} },100);
    setTimeout(()=>{clearInterval(t);res();},3000);
  });

  window.addEventListener('load', async ()=>{
    await fbWait;
    if(fbReady && window._fb){
      window._fb.onAuthStateChanged(window._fb.auth, user=>{
        if(!user){ const s=getSess(); if(!s||!s.email){window.location.href='index.html';return;} loadProfile(s); }
        else { loadProfile({name:user.displayName||user.email.split('@')[0],email:user.email}); }
      });
    } else {
      const s=getSess(); if(!s||!s.email){window.location.href='index.html';return;} loadProfile(s);
    }
  });

  let userName = 'Usuario';
  function loadProfile(s){
    userName = s.name || 'Usuario';
    document.getElementById('home-name').textContent = userName;
    document.getElementById('av-letter').textContent  = userName[0].toUpperCase();
    document.getElementById('um-name').textContent    = userName;
  }

  async function handleLogout(){
    await fbWait;
    if(fbReady && window._fb){ try{await window._fb.signOut(window._fb.auth);}catch{} }
    clearSess(); window.location.href='index.html';
  }

  function toggleUMenu(){ document.getElementById('umenu').classList.toggle('open'); }
  function closeUMenu() { document.getElementById('umenu').classList.remove('open'); }
  document.addEventListener('click', e=>{
    if(!e.target.closest('#umenu') && !e.target.closest('#avatar-btn')) closeUMenu();
  });

  function showToast(msg, ok=false){
    const t=document.getElementById('toast'); t.textContent=msg;
    t.className='toast'+(ok?' ok':'');
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000);
  }

  // Auto-resize textarea
  function autoResize(el){
    el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px';
  }

  function handleKey(e){
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
  }

  // ── CHAT UI ──
  let messageCount = 0;

  function removeEmptyState(){
    const es = document.getElementById('empty-state');
    if(es) es.remove();
  }

  function appendMessage(role, text, ia=''){
    removeEmptyState();
    messageCount++;
    const chat = document.getElementById('chat');

    const isUser = role === 'user';
    const avatarText = isUser ? (userName[0]||'U').toUpperCase() : 'MAX';
    const displayName = isUser ? userName : 'M.A.X';

    // Badge IA
    let metaHtml = '';
    if(!isUser && ia){
      const labels = {gemini:'✨ Gemini', groq:'⚡ Groq', cohere:'🌐 Cohere', offline:'💾 Offline', live:'🔵 Live'};
      const label = labels[ia] || ia;
      metaHtml = `<span>${label}</span>`;
    }

    const row = document.createElement('div');
    row.className = `msg-row ${isUser ? 'user' : 'max'}`;
    row.innerHTML = `
      <div class="msg-avatar">${avatarText}</div>
      <div class="msg-content">
        <div class="msg-name">${displayName}</div>
        <div class="msg-bubble">${escapeHtml(text)}</div>
        ${metaHtml ? `<div class="msg-meta">${metaHtml}</div>` : ''}
      </div>`;

    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return row;
  }

  function showTyping(){
    removeEmptyState();
    const chat = document.getElementById('chat');
    const row = document.createElement('div');
    row.className = 'msg-row max'; row.id = 'typing-row';
    row.innerHTML = `
      <div class="msg-avatar">MAX</div>
      <div class="msg-content">
        <div class="msg-name">M.A.X</div>
        <div class="typing-bubble">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>`;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping(){
    const t = document.getElementById('typing-row');
    if(t) t.remove();
  }

  function clearChat(){
    closeUMenu();
    const chat = document.getElementById('chat');
    chat.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="empty-orb">MAX</div>
        <div class="empty-txt">Chat limpiado.<br>Escríbeme algo para comenzar.</div>
      </div>`;
    AI_ROUTER.historial = [];
    messageCount = 0;
  }

  function setIaBadge(ia){
    const badge = document.getElementById('ia-badge');
    const labels = {gemini:'✨ Gemini', groq:'⚡ Groq', cohere:'🌐 Cohere', offline:'💾 Offline'};
    badge.textContent = labels[ia] || ('⚡ '+ia);
  }

  function escapeHtml(t){
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── SEND ──
  async function handleSend(){
    const input = document.getElementById('msg-input');
    const btn   = document.getElementById('send-btn');
    const v = input.value.trim();
    if(!v) return;

    input.value = ''; input.style.height = 'auto';
    btn.disabled = true;

    appendMessage('user', v);
    showTyping();

    await AI_ROUTER.enviar(v,
      (respuesta, ia) => {
        removeTyping();
        // Quitar prefijo "🔵 Modo Live: " o "🟢 Modo Offline: " si existe
        const clean = respuesta.replace(/^(🔵 Modo Live:|🟢 Modo Offline:)\s*/,'');
        appendMessage('max', clean, ia);
        setIaBadge(ia);
        hablarSalome(clean);
        btn.disabled = false;
      },
      (error) => {
        removeTyping();
        appendMessage('max', '❌ '+error, '');
        btn.disabled = false;
      }
    );
  }
</script>

<!-- AI ROUTER -->
<script>
  // ── GESTIÓN DE RECORDATORIOS ──────────────────────────────
  function getReminders(){ return JSON.parse(localStorage.getItem("max_reminders")||"[]"); }
  function saveReminders(r){ localStorage.setItem("max_reminders", JSON.stringify(r)); }

  function agregarRecordatorio(texto){
    const r = getReminders();
    r.push(texto);
    saveReminders(r);
  }

  // Detecta si el mensaje quiere guardar algo (cita, recordatorio, evento)
  function quiereGuardar(texto){
    const t = texto.toLowerCase();
    return /(tengo|agenda|agéndame|guarda|añade|crea|pon|recuérdame|recuerdame|tengo cita|tengo reunión|tengo clase|tengo evento|para el|el día|el próximo|este \d+)/.test(t);
  }

  // Extrae el texto útil del recordatorio desde el mensaje del usuario
  function extraerRecordatorio(texto){
    // Limpia frases introductorias y deja el evento
    return texto
      .replace(/^(agéndame|agendame|guarda|añade|crea|pon un recordatorio de|recuérdame|recuerdame|tengo que recordar que|por favor)\s*/i,'')
      .trim();
  }

  // ── AI ROUTER ─────────────────────────────────────────────
  const AI_ROUTER = {
    WORKER_URL: "https://maxiarouter.pabloandresperlaza16.workers.dev",
    historial: [],

    // Sistema prompt con instrucciones especiales para recordatorios
    getSistemaPrompt(){
      const reminders = getReminders();
      const listaRecordatorios = reminders.length
        ? reminders.map((r,i)=>`${i+1}. ${r}`).join("\n")
        : "No hay recordatorios guardados.";

      return `Eres MAX, un asistente inteligente y amigable. Responde siempre en español de forma clara y concisa.

INFORMACIÓN DEL USUARIO:
- Recordatorios actuales:
${listaRecordatorios}

INSTRUCCIONES ESPECIALES:
- Si el usuario pregunta por sus recordatorios, citas o eventos, usa la lista de arriba para responder.
- Si el usuario menciona que tiene una cita, evento, reunión, clase u otra actividad que debe recordar, responde confirmando que lo guardarás y agrega al final de tu respuesta exactamente esta línea:
  [GUARDAR_RECORDATORIO: texto del recordatorio aquí]
- El texto del recordatorio debe ser claro y conciso, por ejemplo: "Cita médica el 18 de mayo"
- Solo agrega [GUARDAR_RECORDATORIO:...] cuando el usuario explícitamente quiera guardar algo.`;
    },

    isMath(texto){
      return /^[\d\s\+\-\*\/\.\(\)]+$/.test(texto.trim());
    },

    async enviar(mensajeUsuario, onSuccess, onError){

      // Matemáticas simples → offline
      if(this.isMath(mensajeUsuario)){
        try{
          const r = Function("return "+mensajeUsuario)();
          onSuccess(`El resultado es **${r}**`, "offline");
        } catch {
          onSuccess("No pude resolver esa operación.", "offline");
        }
        return;
      }

      this.historial.push({role:"user", content:mensajeUsuario});

      try{
        const response = await fetch(this.WORKER_URL, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            mensajes: this.historial,
            sistemaPrompt: this.getSistemaPrompt()  // ← siempre actualizado con recordatorios
          })
        });

        const data = await response.json();
        if(data.error) throw new Error(data.error);

        let respuesta = data.respuesta;

        // ── Detectar si MAX quiere guardar un recordatorio ──
        const matchGuardar = respuesta.match(/\[GUARDAR_RECORDATORIO:\s*(.+?)\]/i);
        if(matchGuardar){
          const textoRecordatorio = matchGuardar[1].trim();
          agregarRecordatorio(textoRecordatorio);
          // Quitar la etiqueta de la respuesta visible
          respuesta = respuesta.replace(/\[GUARDAR_RECORDATORIO:.*?\]/i, '').trim();
          respuesta += `\n\n✅ Guardé en tus recordatorios: *${textoRecordatorio}*`;
        }

        this.historial.push({role:"assistant", content:data.respuesta});
        if(this.historial.length > 40) this.historial = this.historial.slice(-40);

        onSuccess(respuesta, data.ia || "live");

      }catch(err){
        console.error("ERROR REAL:", err);
        this.historial.pop();
        onError("Error: " + err.message);
      }
    }
  };
</script>
<!-- ══ VOZ SALOME ══ -->
<script>
  let vozSalome = null;
  let modoLlamada = false;
  let recognition = null;
  let maxHablando = false;

  function cargarVozSalome() {
    const voices = speechSynthesis.getVoices();
    vozSalome = voices.find(v =>
      v.name === 'Microsoft Salome Online (Natural) - Spanish (Colombia)'
    );
    if (!vozSalome) vozSalome = voices.find(v =>
      v.name === 'Google español de Estados Unidos'
    );
    if (!vozSalome) vozSalome = voices.find(v =>
      v.name === 'Google español'
    );
    if (!vozSalome) vozSalome = voices.find(v => v.lang.startsWith('es'));
  }
  speechSynthesis.onvoiceschanged = cargarVozSalome;
  cargarVozSalome();
  setTimeout(cargarVozSalome, 500);
  setTimeout(cargarVozSalome, 1500);

  function hablarSalome(texto) {
    if (!modoLlamada) return;
    speechSynthesis.cancel();
    maxHablando = true;
    setBtnHablando(true);

    pararMic();

    // Mic de interrupción — escucha mientras MAX habla
    setTimeout(() => {
      if (modoLlamada) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SR) {
          recognition = new SR();
          recognition.lang = 'es-CO';
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.onresult = (e) => {
            const t = e.results[0][0].transcript;
            if (t.trim()) {
              speechSynthesis.cancel();
              maxHablando = false;
              setBtnHablando(false);
              pararMic();
              document.getElementById('msg-input').value = t.trim();
              setTimeout(() => handleSend(), 200);
            }
          };
          recognition.onend = () => {
            if (modoLlamada && maxHablando) {
              try { recognition.start(); } catch(e) {}
            }
          };
          try { recognition.start(); } catch(e) {}
        }
      }
    }, 300);

    setTimeout(() => {
      if (!vozSalome) cargarVozSalome();
      const utt = new SpeechSynthesisUtterance(texto);
      if (vozSalome) utt.voice = vozSalome;
      utt.lang  = 'es-CO';
      utt.rate  = 1.0;
      utt.pitch = 1.0;

      utt.onend = () => {
        setBtnHablando(false);
        maxHablando = false;
        pararMic();
        setTimeout(() => {
          if (modoLlamada) iniciarMic();
        }, 800);
      };

      speechSynthesis.speak(utt);
    }, 150);
  }

  function iniciarMic() {
    if (!modoLlamada || maxHablando) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;

    recognition = new SR();
    recognition.lang = 'es-CO';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
      if (maxHablando) return;

      let interino = '';
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interino += t;
      }

      const input = document.getElementById('msg-input');
      input.value = final || interino;
      autoResize(input);

      if (final.trim()) {
        input.value = final.trim();
        pararMic();
        setTimeout(() => handleSend(), 300);
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') {
        if (modoLlamada && !maxHablando) {
          setTimeout(() => iniciarMic(), 300);
        }
        return;
      }
      showToast('Error: ' + e.error);
      detenerLlamada();
    };

    recognition.onend = () => {
      if (modoLlamada && !maxHablando) {
        setTimeout(() => iniciarMic(), 300);
      }
    };

    try { recognition.start(); } catch(e) {}
  }

  function pararMic() {
    if (recognition) {
      try { recognition.abort(); } catch(e) {}
      recognition = null;
    }
  }

  function setBtnHablando(v) {
    const btn = document.getElementById('voice-btn');
    if (!btn) return;
    if (v) {
      btn.classList.remove('activo');
      btn.classList.add('hablando');
    } else {
      btn.classList.remove('hablando');
      btn.classList.add('activo');
    }
  }

  function toggleModoLlamada() {
    if (!modoLlamada) {
      modoLlamada = true;
      maxHablando = false;
      iniciarMic();
      const btn = document.getElementById('voice-btn');
      if (btn) btn.classList.add('activo');
      showToast('🎙️ Modo voz activado', true);
    } else {
      detenerLlamada();
    }
  }

  function detenerLlamada() {
    pararMic();
    speechSynthesis.cancel();
    modoLlamada = false;
    maxHablando = false;
    const btn = document.getElementById('voice-btn');
    if (btn) btn.classList.remove('activo', 'hablando');
    showToast('Modo voz desactivado');
  }
  // ══ WAKE WORD ══
let wakeRecognition = null;
let wakeActivo = false;

function iniciarWakeWord() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;

  wakeRecognition = new SR();
  wakeRecognition.lang = 'es-CO';
  wakeRecognition.continuous = false;
  wakeRecognition.interimResults = false;

  wakeRecognition.onresult = (e) => {
    const texto = e.results[0][0].transcript.toLowerCase().trim();
    console.log('Wake escuchó:', texto);

    // Detectar "max" o "hola max"
    if (texto.includes('max') || texto.includes('hola max')) {
      if (!modoLlamada) {
        toggleModoLlamada();
        showToast('👋 ¡Hola! Modo voz activado', true);
      }
    }
  };

  wakeRecognition.onend = () => {
    // Reiniciar siempre que no esté en modo llamada
    if (!modoLlamada) {
      setTimeout(() => {
        try { wakeRecognition.start(); } catch(e) {}
      }, 300);
    }
  };

  wakeRecognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') {
      if (!modoLlamada) {
        setTimeout(() => {
          try { wakeRecognition.start(); } catch(e) {}
        }, 300);
      }
      return;
    }
  };

  try { wakeRecognition.start(); wakeActivo = true; } catch(e) {}
}

function detenerWakeWord() {
  if (wakeRecognition) {
    try { wakeRecognition.abort(); } catch(e) {}
    wakeRecognition = null;
  }
  wakeActivo = false;
}

// Cuando se desactiva el modo llamada → reactivar wake word
const _detenerLlamadaOriginal = detenerLlamada;
detenerLlamada = function() {
  _detenerLlamadaOriginal();
  setTimeout(() => iniciarWakeWord(), 1000);
};

// Arrancar wake word al cargar la página
window.addEventListener('load', () => {
  setTimeout(() => iniciarWakeWord(), 2000);
});
</script>
